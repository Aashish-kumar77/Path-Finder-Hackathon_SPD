<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - Territory Runner</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Barlow', sans-serif; background: #0a0f0a; color: #e8f5e8; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
  .box { background: #111811; padding: 40px; border: 1px solid rgba(34,197,94,0.18); border-radius: 6px; width: 320px; text-align: center; }
  h2 { font-family: 'Barlow Condensed', sans-serif; color: #22c55e; letter-spacing: 2px; text-transform: uppercase; font-size: 28px; margin-bottom: 25px; }
  input { width: 100%; padding: 12px; margin-bottom: 15px; background: #0a0f0a; border: 1px solid rgba(34,197,94,0.18); color: white; border-radius: 4px; box-sizing: border-box; font-family: 'Barlow', sans-serif; }
  input:focus { outline: none; border-color: #22c55e; }
  button { width: 100%; padding: 14px; background: #22c55e; color: #0a0f0a; border: none; border-radius: 4px; font-weight: 700; font-family: 'Barlow Condensed', sans-serif; font-size: 18px; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; }
  button:hover { background: #16a34a; }
  a { color: #6b8f6b; text-decoration: none; font-size: 14px; transition: color 0.2s; }
  a:hover { color: #22c55e; }
  .flash { color: #ef4444; font-size: 14px; margin-bottom: 15px; }
</style>
</head>
<body>
  <div class="box">
    <h2>Enlist Now</h2>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <input type="text" name="username" placeholder="Username" required>
      <input type="email" name="email" placeholder="Email Address" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Register</button>
    </form>
    <p style="margin-top: 20px;"><a href="{{ url_for('login') }}">Back to Login</a></p>
  </div>
</body>
</html>
